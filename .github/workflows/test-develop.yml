name: CI/CD Develop & Main

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest
        run: pytest

  build-and-release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bump version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main,develop

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build z cachem i załadowanie do lokalnego Dockera dla Smoke Testu
      - name: Build and Load for Smoke Test
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: app-dev-test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Smoke Test
        run: |
          docker run -d -p 8000:8000 --name smoke-test app-dev-test:${{ github.sha }}
          sleep 5
          if curl -s localhost:8000 > /dev/null; then
            echo "Smoke test passed!"
            docker stop smoke-test
          else
            echo "Smoke test failed!"
            docker logs smoke-test
            exit 1
          fi

      # Push finalnego obrazu (używa cache z poprzedniego kroku - trwa sekundy)
      - name: Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hello-app:latest
            ghcr.io/${{ github.repository_owner }}/hello-app:${{ steps.tag_version.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max