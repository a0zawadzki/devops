name: CI/CD Develop (Production Grade)

on:
  push:
    branches: [ "develop" ]

jobs:
  # KROK 1: Testy jednostkowe
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run Pytest
        run: pytest

  # KROK 2: Build, Smoke Test i Push
  build-and-release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Wyliczanie wersji (np. v1.1.0)
      - name: Bump version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch           # Zmieniamy na patch (0.1.x), chyba że wolisz minor (0.x.0)
          release_branches: develop      # To usunie dopisek "-develop"

      - name: Build Image for Smoke Test
        run: docker build -t app-dev-test:${{ github.sha }} .

      # SMOKE TEST: Sprawdzamy, czy aplikacja faktycznie działa
      - name: Run Smoke Test
        run: |
          docker run -d -p 8000:8000 --name smoke-test app-dev-test:${{ github.sha }}
          sleep 5 # Czekamy chwilę na start FastAPI
          if curl -s localhost:8000 > /dev/null; then
            echo "Smoke test passed!"
            docker stop smoke-test
          else
            echo "Smoke test failed! App did not respond."
            docker logs smoke-test
            exit 1
          fi

      # LOGOWANIE I PUSH (Tylko jeśli Smoke Test przeszedł)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hello-app:latest
            ghcr.io/${{ github.repository_owner }}/hello-app:${{ steps.tag_version.outputs.new_tag }}