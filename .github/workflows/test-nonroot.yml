name: CI Non-Root PRO (Versioning & Push)

on:
  push:
    branches: [ "feature/docker-nonroot" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run Pytest
        run: pytest

  release-and-build:
    needs: unit-tests
    runs-on: ubuntu-latest
    # Kluczowe uprawnienia dla PRO: zapis tagów i pakietów
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pobiera historię dla poprawnego wyliczenia wersji

      # 1. Automatyczne wyliczanie wersji i tworzenie tagu w Git
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      # 2. Logowanie do GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build i Push z nowym numerem wersji
      - name: Build and push Non-Root Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hello-nonroot:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/${{ github.repository_owner }}/hello-nonroot:latest