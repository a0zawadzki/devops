services:
  api:
    # 1. Budowanie obrazu z konkretnego kontekstu
    build: 
      context: .
      dockerfile: Dockerfile
    
    # 2. Nazewnictwo i sieć
    image: hello-nonroot:1.0.0
    container_name: fast-api-app
    ports:
      - "8000:8000"

    # 3. Bezpieczeństwo (Hardening)
    security_opt:
      - no-new-privileges:true  # Blokuje możliwość zdobycia uprawnień roota przez luki w kernelu
    cap_drop:
      - ALL                    # Zabiera wszystkie domyślne uprawnienia systemowe
    cap_add:
      - NET_BIND_SERVICE       # Pozwala tylko na bindowanie portów (minimalne uprawnienie sieciowe)
    read_only: true
    tmpfs:
      - /tmp  # Python i Uvicorn mogą potrzebować miejsca na pliki tymczasowe
      - /home/appuser/.cache # Dla pip/pythona, jeśli coś tam zapisują

    # 4. Limity zasobów (Zapobiega "wyciekom" pamięci i zawieszaniu hosta)
    deploy:
      resources:
        limits:
          cpus: '0.5'           # Max 50% jednego rdzenia CPU
          memory: 256M          # Max 256MB RAM

    # 5. Polityka restartu (Ważne na serwerze)
    restart: unless-stopped